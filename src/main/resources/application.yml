# Application Configuration for SpringDemoTodo
# This file contains Spring Boot configuration settings for the Todo application

spring:
  profiles:
    # Active profile determines which repository implementation and features are enabled
    # Can be overridden with SPRING_PROFILES_ACTIVE environment variable
    # Profiles:
    #   - dev: Uses InMemoryListTodoRepository (ArrayList-based, development only)
    #   - prod: Uses InMemoryMapTodoRepository (HashMap-based, for production)
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    # Application name used in logs and Spring Boot admin console
    name: SpringDemoTodo

server:
  # Server port for the REST API
  # Can be overridden with SPRING_SERVER_PORT environment variable
  # Default port: 8080
  port: ${SPRING_SERVER_PORT:8080}
